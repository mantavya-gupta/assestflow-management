version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: assetflow-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-assetflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env file}
      POSTGRES_DB: ${POSTGRES_DB:-assetflow}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
